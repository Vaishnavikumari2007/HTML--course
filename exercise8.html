<!DOCTYPE html>
<html>
    <head>
        <title> searchbox </title>
     <style>
        .email{
           display:block;
           margin-top:7px;
        }
        .para,
        .agree,
        .disagree{
            display: inline-block;
            margin-left:10px;
        }
        .logo{
            display: block;
            margin-top:30px;
        }
        .search-google{
            font-size :20px;
            width :290px;
            display: block;
            margin-bottom: 20px;
        }
     .name{
         display: inline-block;
         margin-right: 2px;
         border-radius : 5px;
         }
     .names{
         display: inline-block;
         border-radius : 5px;
        }

     </style>
    </head>
    <body>
     <input class=" name" type ="text" placeholder="Name">
     <input class="email" type="text" placeholder="Email">
     <p class="para"> Thanks for chatting with our <br>customer soppurt. Would you <br>like totake our quick survey ? </p>
     <button class=" agree"> Yes </button>
     <button class="disagree"> No</button>
     <img class="logo" src="Google_logo.svg">
     <input class="search-google" type="text" placeholder="Search Google or type a URL">
     <button class="name"> First name</button>
     <button class="names"> First name </button>
    </body>
